<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | FarmConnect</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

.login{

height:85vh;

display:flex;

justify-content:center;

align-items:center;

}

.formulario{

background:white;

padding:40px;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,.2);

width:400px;

}

.formulario h2{

text-align:center;

margin-bottom:20px;

color:#2E7D32;

}

.formulario input{

width:100%;

padding:12px;

margin:10px 0;

border:1px solid #ccc;

border-radius:8px;

}

.formulario button{

width:100%;

padding:12px;

background:#2E7D32;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

font-size:16px;

}

.formulario button:hover{

background:#1B5E20;

}

</style>

</head>

<body>

<header>

<nav>

<h2>🌱 FarmConnect</h2>

<ul>

<li><a href="index.html">Home</a></li>

<li><a href="shop.html">Shop</a></li>

<li><a href="register.html">Register</a></li>

<li><a href="cart.html">Cart</a></li>

</ul>

</nav>

</header>

<section class="login">

<div class="formulario">

<h2>Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button onclick="ingresar()">Login</button>

</div>

</section>

<script>

function ingresar(){

alert("Welcome to FarmConnect!");

window.location="shop.html";

}

</script>

</body>

</html>
