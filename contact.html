<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | FarmConnect</title>

<link rel="stylesheet" href="css/style.css">

<style>

.contacto{

max-width:1000px;
margin:120px auto;
padding:20px;

}

.contacto h2{

text-align:center;
color:#2E7D32;
font-size:40px;
margin-bottom:30px;

}

.formulario{

background:white;
padding:40px;
border-radius:15px;
box-shadow:0px 10px 30px rgba(0,0,0,.2);

}

.formulario input,
.formulario textarea{

width:100%;
padding:15px;
margin:15px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;

}

.formulario textarea{

height:150px;
resize:none;

}

.formulario button{

width:100%;
padding:15px;
background:#2E7D32;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;

}

.formulario button:hover{

background:#1B5E20;

}

.info{

margin-top:40px;
text-align:center;
line-height:35px;
font-size:18px;

}

</style>

</head>

<header>

<nav>

<h2>🌱 FarmConnect</h2>

<ul>

<li><a href="index.html">Home</a></li>

<li><a href="login.html">Login</a></li>
<li><a href="cart.html">Cart</a></li>

</ul>

</nav>

</header>

<div class="contacto">

<h2>Contact Us</h2>

<div class="formulario">

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea placeholder="Write your message..."></textarea>

<button onclick="enviar()">Send Message</button>

</div>

<div class="info">

<p>📍 Ocaña, Norte de Santander - Colombia</p>

<p>📞 +57 314 306 4701</p>

</div>

alert("✅ Your message has been sent successfully!");

}

</script>
